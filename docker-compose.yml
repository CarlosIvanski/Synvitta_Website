services:
  web:
    build: .
    image: synvitta-website:latest
    container_name: synvitta-web
    restart: unless-stopped
    ports:
      - "1010:80"
    # Quando tiver SSL, use um proxy (ex.: Caddy/Traefik) ou descomente:
    # ports:
    #   - "8080:80"

  forms:
    build: ./backend
    image: synvitta-forms:latest
    container_name: synvitta-forms
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data