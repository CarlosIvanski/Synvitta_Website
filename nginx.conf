server {
    listen 80;
    server_name localhost www.synvittadiagnostics.com;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Video files (explicit MIME + byte-range for seeking/playback)
    location /video/ {
        types { video/mp4 mp4; video/webm webm; }
        default_type video/mp4;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Static assets with caching
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML: no cache (for updates)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache";
    }

    # Default: try file, then directory, then index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
